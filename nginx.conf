server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # gzip responses to cut egress and speed up loads
    gzip on;
    gzip_types text/css application/javascript image/svg+xml application/json;
    gzip_min_length 1024;

    # long-cache the content-hashed build assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback (harmless with HashRouter; future-proofs path routing)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
